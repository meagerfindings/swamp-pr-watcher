manifestVersion: 1
name: "@mgreten/pr-watcher"
version: "2026.06.26.3"
description: >
  Autonomous PR-feedback investigation engine: watch a feed of pull-request
  feedback, spawn a coding agent to investigate each PR against its diff,
  propose actions, notify via ntfy with an Approve button, and optionally apply
  an approved fix inside an isolated worktree (build, test, push to the PR
  branch).

repository: https://github.com/meagerfindings/swamp-pr-watcher

models:
  - pr_watcher.ts

additionalFiles:
  - README.md
  - LICENSE.txt

platforms: []
